<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LetsTok Chat</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <!-- ===================== -->
  <!-- LEFT SIDEBAR (NAV) -->
  <!-- ===================== -->
  <div id="sidebar">

    <div id="logo">
      <h2>💬 LetsTok</h2>
    </div>

    <button onclick="openServer()">🌍 Global Server</button>
    <button onclick="openDMPage()">💌 Direct Messages</button>

    <hr>

    <div id="dmCreateBox">
      <h4>Start DM</h4>
      <input id="dmInput" placeholder="Enter username">
      <button onclick="startDM()">Create DM</button>
    </div>

  </div>

  <!-- ===================== -->
  <!-- MAIN SERVER CHAT -->
  <!-- ===================== -->
  <div id="serverPage" class="page">

    <!-- CHAT MESSAGES -->
    <div id="chat">

      <div id="chatHeader">
        <h3>🌍 Global Chat</h3>
      </div>

      <ul id="messages"></ul>

      <div id="inputArea">
        <input id="input" placeholder="Type a message...">
        <button onclick="send()">Send</button>
      </div>

    </div>

    <!-- ONLINE USERS -->
    <div id="usersPanel">

      <h3>🟢 Online Users</h3>

      <ul id="users"></ul>

      <p id="hint">
        Click a user to DM
      </p>

    </div>

  </div>

  <!-- ===================== -->
  <!-- DM PAGE -->
  <!-- ===================== -->
  <div id="dmPage" class="page hidden">

    <div id="dmHeader">
      <h2>💌 Direct Messages</h2>
      <p>Select or start a conversation</p>
    </div>

    <div id="dmList"></div>

    <div id="dmEmptyState">
      <p>No DM selected yet</p>
    </div>

  </div>

</div>

<!-- SOCKET.IO -->
<script src="/socket.io/socket.io.js"></script>

<!-- YOUR SCRIPT -->
<script src="script.js"></script>

</body>
</html>
