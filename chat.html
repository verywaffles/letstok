<!DOCTYPE html>
<html>
<head>
  <title>LetsTok</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- LEFT SIDEBAR -->
  <div id="sidebar">

    <h2>LetsTok</h2>

    <button onclick="openGlobal()">🌍 Global</button>

    <button onclick="openDMs()">💬 DMs</button>

    <button onclick="createGroup()">➕ Group</button>

    <div id="dmPanel" style="display:none;">
      <input id="dmUser" placeholder="Enter username">
      <button onclick="startDM()">Start DM</button>
    </div>

  </div>

  <!-- CHAT AREA -->
  <div id="chat">
    <ul id="messages"></ul>

    <div id="inputArea">
      <input id="input" placeholder="message...">
      <button onclick="send()">Send</button>
    </div>
  </div>

  <!-- RIGHT USERS -->
  <div id="usersPanel">
    <h3>Online</h3>
    <ul id="users"></ul>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
