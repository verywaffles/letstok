<!DOCTYPE html>
<html>
<head>
  <title>LetsTok Login</title>
</head>
<body>
  <h2>LetsTok Login</h2>

  <input id="name" placeholder="username">
  <button onclick="login()">Enter</button>

  <script>
    function login() {
      const name = document.getElementById("name").value;
      localStorage.setItem("name", name);
      window.location.href = "chat.html";
    }
  </script>
</body>
</html>
